<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CP-Lockin — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">

      <header class="header">
        <span class="logo">⚔</span>
        <h1>CP-Lockin <span class="subtitle">Settings</span></h1>
      </header>

      <form id="settings-form" novalidate>

        <!-- Platforms -->
        <section class="section">
          <h2 class="section-title">Platforms</h2>

          <div class="field">
            <label class="field-label" for="cf-handle">
              Codeforces handle
            </label>
            <input
              type="text"
              id="cf-handle"
              name="codeforcesHandle"
              class="field-input"
              placeholder="e.g. tourist"
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <div class="field">
            <label class="field-label" for="lc-handle">
              LeetCode username
            </label>
            <input
              type="text"
              id="lc-handle"
              name="leetcodeHandle"
              class="field-input"
              placeholder="e.g. lee215"
              autocomplete="off"
              spellcheck="false"
            />
            <p class="field-hint">
              Log in to LeetCode in Firefox for full submission history.
              Without a session the last 20 accepted submissions are shown.
            </p>
          </div>
        </section>

        <!-- Goals -->
        <section class="section">
          <h2 class="section-title">Goals</h2>

          <div class="field">
            <label class="field-label" for="weekly-goal">
              Weekly goal <span class="field-unit">(problems)</span>
            </label>
            <input
              type="number"
              id="weekly-goal"
              name="weeklyGoal"
              class="field-input field-input--short"
              min="1"
              max="500"
              value="25"
            />
          </div>

          <div class="field">
            <label class="field-label" for="daily-goal">
              Daily minimum <span class="field-unit">(problems)</span>
            </label>
            <input
              type="number"
              id="daily-goal"
              name="dailyMinGoal"
              class="field-input field-input--short"
              min="1"
              max="100"
              value="1"
            />
          </div>

          <div class="field">
            <label class="checkbox-field" for="require-both-sites-streak">
              <input
                type="checkbox"
                id="require-both-sites-streak"
                name="requireBothSitesForStreak"
              />
              <span>Count streak only when both sites have a submission that day</span>
            </label>
            <p class="field-hint">
              If enabled, a day only contributes to your streak when both Codeforces and LeetCode have at least one accepted submission.
            </p>
          </div>
        </section>

        <div class="form-footer">
          <div id="save-status" class="save-status hidden"></div>
          <button type="submit" class="btn-save">Save settings</button>
        </div>

      </form>

    </div>

    <script src="../utils/browserShim.js"></script>
    <script src="../config/defaults.js"></script>
    <script src="../storage/storageService.js"></script>
    <script src="options.js"></script>
  </body>
</html>
